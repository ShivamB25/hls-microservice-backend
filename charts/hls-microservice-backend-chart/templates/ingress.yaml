{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "hls.fullname" . }}
  labels:
    {{- include "hls.commonLabels" . | nindent 4 }}
    {{- include "hls.selectorLabels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ default "Prefix" .pathType }}
            backend:
              service:
                name: >-
                  {{- if eq .service "main" }}{{ include "hls.main.fullname" $ }}
                  {{- else if eq .service "hls-static" }}{{ include "hls.static.fullname" $ }}
                  {{- else }}{{ fail "ingress.paths[].service must be 'main' or 'hls-static'" }}
                  {{- end }}
                port:
                  number: {{ if eq .service "main" }}{{ $.Values.mainService.service.port }}{{ else }}{{ $.Values.hlsStatic.service.port }}{{ end }}
          {{- end }}
    {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
