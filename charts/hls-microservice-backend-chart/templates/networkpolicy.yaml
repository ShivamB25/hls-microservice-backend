{{- if and .Values.networkPolicy.enabled .Values.mainService.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "hls.main.fullname" . }}
  labels:
    {{- include "hls.commonLabels" . | nindent 4 }}
    {{- include "hls.componentSelectorLabels" (dict "root" . "component" "main") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "hls.componentSelectorLabels" (dict "root" . "component" "main") | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- toYaml .Values.networkPolicy.mainService.ingress | nindent 4 }}
  egress:
    {{- toYaml .Values.networkPolicy.mainService.egress | nindent 4 }}
{{- end }}
{{- if and .Values.networkPolicy.enabled .Values.videoProcessor.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "hls.worker.fullname" . }}
  labels:
    {{- include "hls.commonLabels" . | nindent 4 }}
    {{- include "hls.componentSelectorLabels" (dict "root" . "component" "video-processor") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "hls.componentSelectorLabels" (dict "root" . "component" "video-processor") | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- toYaml .Values.networkPolicy.videoProcessor.ingress | nindent 4 }}
  egress:
    {{- toYaml .Values.networkPolicy.videoProcessor.egress | nindent 4 }}
{{- end }}
{{- if and .Values.networkPolicy.enabled .Values.hlsStatic.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "hls.static.fullname" . }}
  labels:
    {{- include "hls.commonLabels" . | nindent 4 }}
    {{- include "hls.componentSelectorLabels" (dict "root" . "component" "hls-static") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "hls.componentSelectorLabels" (dict "root" . "component" "hls-static") | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- toYaml .Values.networkPolicy.hlsStatic.ingress | nindent 4 }}
  egress:
    {{- toYaml .Values.networkPolicy.hlsStatic.egress | nindent 4 }}
{{- end }}
