{{- if .Values.mainService.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hls.main.fullname" . }}
  labels:
    {{- include "hls.commonLabels" . | nindent 4 }}
    {{- include "hls.componentSelectorLabels" (dict "root" . "component" "main") | nindent 4 }}
  {{- with .Values.mainService.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.mainService.service.type }}
  selector:
    {{- include "hls.componentSelectorLabels" (dict "root" . "component" "main") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.mainService.service.port }}
      targetPort: http
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hls.main.fullname" . }}
  labels:
    {{- include "hls.commonLabels" . | nindent 4 }}
    {{- include "hls.componentSelectorLabels" (dict "root" . "component" "main") | nindent 4 }}
spec:
  replicas: {{ .Values.mainService.replicaCount }}
  revisionHistoryLimit: 3
  strategy:
    {{- toYaml .Values.mainService.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "hls.componentSelectorLabels" (dict "root" . "component" "main") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hls.commonLabels" . | nindent 8 }}
        {{- include "hls.componentSelectorLabels" (dict "root" . "component" "main") | nindent 8 }}
        {{- with .Values.mainService.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.mainService.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "hls.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.mainService.terminationGracePeriodSeconds }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mainService.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.mainService.waitForDependencies }}
      initContainers:
        - name: wait-for-mongodb
          image: "{{ .Values.global.waitFor.image.repository }}:{{ .Values.global.waitFor.image.tag }}"
          imagePullPolicy: {{ .Values.global.waitFor.image.pullPolicy }}
          command:
            - sh
            - -c
            - >-
              until nc -z -w 2 {{ .Values.externalServices.mongodb.host }} {{ .Values.externalServices.mongodb.port }};
              do echo "waiting for mongodb"; sleep 2; done
        - name: wait-for-rabbitmq
          image: "{{ .Values.global.waitFor.image.repository }}:{{ .Values.global.waitFor.image.tag }}"
          imagePullPolicy: {{ .Values.global.waitFor.image.pullPolicy }}
          command:
            - sh
            - -c
            - >-
              until nc -z -w 2 {{ .Values.externalServices.rabbitmq.host }} {{ .Values.externalServices.rabbitmq.port }};
              do echo "waiting for rabbitmq"; sleep 2; done
      {{- end }}
      containers:
        - name: main-service
          image: "{{ .Values.mainService.image.repository }}:{{ default .Chart.AppVersion .Values.mainService.image.tag }}"
          imagePullPolicy: {{ .Values.mainService.image.pullPolicy }}
          {{- with .Values.mainService.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.mainService.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "hls.configmapName" . }}
            - secretRef:
                name: {{ include "hls.secretName" . }}
            {{- with .Values.mainService.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: PORT
              value: {{ .Values.mainService.service.port | quote }}
            - name: UPLOAD_DIR
              value: {{ .Values.config.uploadDir | quote }}
            {{- with .Values.mainService.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.config.apiHealthPath }}
              port: http
            {{- toYaml .Values.mainService.livenessProbe | nindent 12 }}
          readinessProbe:
            httpGet:
              path: {{ .Values.config.apiReadyPath }}
              port: http
            {{- toYaml .Values.mainService.readinessProbe | nindent 12 }}
          startupProbe:
            httpGet:
              path: {{ .Values.config.apiReadyPath }}
              port: http
            {{- toYaml .Values.mainService.startupProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.mainService.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: media
              mountPath: {{ .Values.config.uploadDir }}
              subPath: {{ .Values.persistence.subPaths.uploads }}
            {{- end }}
            {{- with .Values.mainService.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: media
          persistentVolumeClaim:
            claimName: {{ include "hls.pvcName" . }}
        {{- end }}
        {{- with .Values.mainService.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.mainService.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mainService.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mainService.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- if .Values.mainService.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "hls.main.fullname" . }}
  labels:
    {{- include "hls.commonLabels" . | nindent 4 }}
    {{- include "hls.componentSelectorLabels" (dict "root" . "component" "main") | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "hls.main.fullname" . }}
  minReplicas: {{ .Values.mainService.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.mainService.autoscaling.maxReplicas }}
  behavior:
    {{- toYaml .Values.mainService.autoscaling.behavior | nindent 4 }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.mainService.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
{{- if .Values.mainService.pdb.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "hls.main.fullname" . }}
  labels:
    {{- include "hls.commonLabels" . | nindent 4 }}
    {{- include "hls.componentSelectorLabels" (dict "root" . "component" "main") | nindent 4 }}
spec:
  minAvailable: {{ .Values.mainService.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "hls.componentSelectorLabels" (dict "root" . "component" "main") | nindent 6 }}
{{- end }}
{{- end }}
